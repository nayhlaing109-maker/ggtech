name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Supabase Secrets
        run: |
          echo "Setting FCM_SERVICE_ACCOUNT..."
          echo "${{ secrets.FCM_SERVICE_ACCOUNT }}" | supabase secrets set FCM_SERVICE_ACCOUNT
          echo "Setting FCM_PROJECT_ID..."
          supabase secrets set FCM_PROJECT_ID=pyapay-driver
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: qvnrrqjhzgaulfvrjcay

      - name: Deploy Supabase Edge Function with Debug
        run: |
          echo "Deploying function with debug output..."
          supabase functions deploy send-notification --project-ref qvnrrqjhzgaulfvrjcay --no-verify-jwt --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
