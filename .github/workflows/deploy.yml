name: Deploy Supabase Edge Function

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Supabase CLI
      run: |
        curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
        sudo mv supabase /usr/local/bin/
        supabase --version
        
    - name: Link Supabase Project
      run: |
        supabase link --project-ref qvnrrqjhzgaulfvrjcay
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        
    - name: Set Secrets
      run: |
        echo '${{ secrets.FCM_SERVICE_ACCOUNT }}' | supabase secrets set FCM_SERVICE_ACCOUNT
        supabase secrets set FCM_PROJECT_ID=pyapay-driver
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        
    - name: Deploy Edge Function
      run: |
        supabase functions deploy send-notification --no-verify-jwt
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
